<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — EduManage</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth-landing.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <div class="auth-container">
    <div style="position:absolute; top: 20px; left: 20px;">
      <a href="index.html" class="btn btn-outline btn-sm"><i class="fa-solid fa-arrow-left"></i> Home</a>
    </div>
    <div style="position:absolute; top: 20px; right: 20px;">
      <button class="btn btn-icon dark-toggle" id="dark-toggle"><i class="fa-solid fa-moon"></i></button>
    </div>

    <div class="auth-card">
      <div class="auth-icon"><i class="fa-solid fa-user" style="color:var(--primary);"></i></div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to your EduManage account.</p>

      <form id="login-form" action="dashboard.html">
        <div class="form-group" style="margin-bottom: 20px;">
          <label class="form-label">Email Address</label>
          <div class="input-wrapper">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input type="email" class="form-control" placeholder="student@edumanage.com" required />
          </div>
        </div>
        <div class="form-group" style="margin-bottom: 28px;">
          <label class="form-label">Password</label>
          <div class="input-wrapper">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" class="form-control" placeholder="••••••••" required />
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; height: 44px; font-size:16px;">
          Log In <i class="fa-solid fa-arrow-right" style="margin-left: 6px;"></i>
        </button>
      </form>

      <div class="auth-links">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
